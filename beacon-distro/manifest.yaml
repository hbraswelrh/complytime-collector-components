dist:
  name: otelcol-beacon
  module: github.com/complytime/complybeacon/beacon
  description: complybeacon collector distro
  output_path: ./beacon

# VERSION MANAGEMENT
# ------------------
# OpenTelemetry component versions are pinned to v0.155.0 (experimental series)
# to match the builder version and ensure compatibility with contrib packages.
#
# These versions are synchronized with proofwatch/go.mod and this manifest via
# `task version:sync`. When updating OTel versions:
#   1. Update proofwatch/go.mod first (manual step, see DEVELOPMENT.md)
#   2. Run `task version:sync` to propagate to this manifest
#   3. Verify with `task integration:test`
#
# The builder (ocb@v0.155.0) requires explicit versions in the manifest.
# Versionless entries generate invalid go.mod syntax.

exporters:
  - gomod: go.opentelemetry.io/collector/exporter/debugexporter v0.155.0
  - gomod: go.opentelemetry.io/collector/exporter/otlphttpexporter v0.155.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/exporter/awss3exporter v0.155.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/exporter/fileexporter v0.155.0

processors:
  - gomod: go.opentelemetry.io/collector/processor/batchprocessor v0.155.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/processor/transformprocessor v0.155.0

receivers:
  - gomod: go.opentelemetry.io/collector/receiver/otlpreceiver v0.155.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/webhookeventreceiver v0.155.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/filelogreceiver v0.155.0

providers:
  - gomod: go.opentelemetry.io/collector/confmap/provider/envprovider v1.61.0
  - gomod: go.opentelemetry.io/collector/confmap/provider/fileprovider v1.61.0
  - gomod: go.opentelemetry.io/collector/confmap/provider/httpprovider v1.61.0
  - gomod: go.opentelemetry.io/collector/confmap/provider/httpsprovider v1.61.0
  - gomod: go.opentelemetry.io/collector/confmap/provider/yamlprovider v1.61.0

extensions:
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/extension/oidcauthextension v0.155.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/extension/bearertokenauthextension v0.155.0

connectors:
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/connector/signaltometricsconnector v0.155.0
