name: SonarQube Analysis

on:
  push:
    branches:
      - main

permissions:
  contents: none
  issues: none
  pull-requests: none

env:
  GO_VERSION: 1.26.4

jobs:
  generate-coverage:
    name: Generate Coverage Report
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "${{ env.GO_VERSION }}"

      - name: Install Task
        uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run test
        run: task test
      - name: Copy coverage file
        run: |
          cp proofwatch/coverage.out coverage.out
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: coverage.out

  sonarqube:
    name: SonarCloud Analysis
    permissions:
      contents: read
      pull-requests: read
    needs: generate-coverage
    uses: complytime/org-infra/.github/workflows/reusable_sonarqube.yml@aff4817ed6f0364e7f899bfb63ec6db42e69fde2 # v0.6.0
    with:
      sonar_organization: ${{ vars.SONAR_ORGANIZATION }}
      sonar_project_key: ${{ vars.SONAR_PROJECT_KEY }}
      coverage_artifact_name: coverage
      coverage_file_path: coverage.out
      language_scanner_property: sonar.go.coverage.reportPaths
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      source_token: ${{ secrets.GITHUB_TOKEN }}
