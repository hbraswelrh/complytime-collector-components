name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  issues: none
  pull-requests: none

jobs:
  call_reusable_ci:
    name: Standardized CI
    uses: complytime/org-infra/.github/workflows/reusable_ci.yml@cfd981e757253218aefb37c91969c32827e5c4b1 # v0.2.1
    permissions:
      contents: read
      issues: read
    # Image publishing is handled exclusively by ci_local.yml, which gates
    # the publish step behind all quality checks (lint, test, codegen verify,
    # integration tests). Duplicating it here caused redundant builds.
