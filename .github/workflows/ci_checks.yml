name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  issues: none
  pull-requests: none

jobs:
  call_reusable_ci:
    name: Standardized CI
    uses: complytime/org-infra/.github/workflows/reusable_ci.yml@aff4817ed6f0364e7f899bfb63ec6db42e69fde2 # v0.6.0
    permissions:
      contents: read
      issues: read
      pull-requests: read
