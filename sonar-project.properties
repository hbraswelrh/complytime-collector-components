# SonarQube Configuration for complytime-collector-components
sonar.projectKey=rh-psce_complytime-collector-components
sonar.organization=rh-psce

# This is the name and version displayed in the SonarCloud UI.
sonar.projectName=complytime-collector-components
sonar.projectVersion=1.0

# Global settings
sonar.exclusions=**/*_test.go,**/vendor/**,**/api/*.gen.go
sonar.test.inclusions=**/*_test.go

# Go specific settings
sonar.go.coverage.reportPaths=coverage.out
# Encoding
sonar.sourceEncoding=UTF-8

# Coverage settings
sonar.coverage.exclusions=**/*_test.go,**/cmd/**,**/api/*.gen.go

# Module configuration
sonar.modules=proofwatch

proofwatch.sonar.projectName=ProofWatch Service
proofwatch.sonar.sources=.
proofwatch.sonar.tests=.

