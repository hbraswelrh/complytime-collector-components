version: "3"

tasks:
  sync:
    desc: Sync Go and OTel versions across all modules, Containerfiles, CI, and docs
    deps:
      - task: :dev:workspace
    cmd: bash {{.ROOT_DIR}}/.taskfiles/scripts/version-sync.sh

  check:
    desc: Validate version alignment (read-only, for CI)
    deps:
      - task: :dev:workspace
    cmd: bash {{.ROOT_DIR}}/.taskfiles/scripts/version-check.sh
