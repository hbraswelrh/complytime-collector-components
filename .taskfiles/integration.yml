version: "3"

vars:
  GINKGO_OUTPUT_DIR: '{{.TEST_DIR | default (printf "%s/.test-output" .ROOT_DIR)}}/integration'
  CERT_DIR: '{{.CERT_DIR | default (printf "%s/certs" .ROOT_DIR)}}'
  # Image selection: local build vs GHCR
  USE_GHCR_IMAGE: '{{.USE_GHCR_IMAGE | default "false"}}'
  GHCR_IMAGE: '{{.GHCR_IMAGE | default "ghcr.io/complytime/complybeacon-beacon-distro"}}'
  GHCR_TAG: '{{.GHCR_TAG | default (env "GITHUB_SHA" | printf "sha-%s")}}'
  # Compose command: podman-compose (local) or docker compose (CI)
  # CI sets this via env var to use docker compose instead of podman-compose
  COMPOSE_CMD: '{{.COMPOSE_CMD | default "podman-compose"}}'
  # Host port overrides — offset from standard ports to avoid conflicts
  # with services already running on the host (e.g. MinIO on 9000).
  # Override with env vars to use different ports.
  # CI uses standard ports (8088, 3100, etc.); local uses offset ports.
  WEBHOOK_PORT: '{{.WEBHOOK_PORT | default "18088"}}'
  LOKI_PORT: '{{.LOKI_PORT | default "13100"}}'
  RUSTFS_PORT: '{{.RUSTFS_PORT | default "19000"}}'
  DEX_PORT: '{{.DEX_PORT | default "15556"}}'
  OTLP_PORT: '{{.OTLP_PORT | default "14317"}}'
  VALID_PROFILES: [base, storage, storage-tls, auth]

tasks:
  default:
    silent: true
    cmd: task integration --list

  ensure-certs:
    desc: Generate self-signed certificates if they do not exist
    status:
      - test -f {{.CERT_DIR}}/ca.crt
      - test -f {{.CERT_DIR}}/ca.key
      - test -f {{.CERT_DIR}}/rustfs.crt
      - test -f {{.CERT_DIR}}/rustfs.key
    cmds:
      - task: :infra:generate-self-signed-cert

  test:
    desc: "Run integration tests (all layers, or PROFILE=base|storage|storage-tls|auth)"
    vars:
      PROFILES:
        sh: |
          if [ -n "{{.PROFILE}}" ]; then
            echo "{{.PROFILE}}"
          else
            echo "base storage"
          fi
    cmds:
      - task: validate-profile
        vars: {PROFILE: "{{.PROFILE}}"}
        if: '[ -n "{{.PROFILE}}" ]'
      - task: ensure-certs
      - task: build-images
        vars:
          USE_GHCR_IMAGE: "{{.USE_GHCR_IMAGE}}"
      - for: {var: PROFILES}
        task: test-layer
        vars:
          PROFILE: "{{.ITEM}}"
          USE_GHCR_IMAGE: "{{.USE_GHCR_IMAGE}}"
          GHCR_TAG: "{{.GHCR_TAG}}"

  test-with-ghcr:
    desc: Run integration tests using GHCR image
    vars:
      GHCR_TAG_INPUT: "{{.GHCR_TAG_INPUT | default .GHCR_TAG}}"
    cmds:
      - task: test
        vars:
          USE_GHCR_IMAGE: "true"
          GHCR_TAG: "{{.GHCR_TAG_INPUT}}"

  test-layer:
    internal: true
    requires:
      vars:
        - name: PROFILE
          enum:
            ref: .VALID_PROFILES
    vars:
      COLLECTOR_CONFIG:
        sh: |
          case "{{.PROFILE}}" in
            base) echo "configs/collector-base.yaml" ;;
            storage) echo "configs/collector-storage.yaml" ;;
            storage-tls) echo "configs/collector-storage-tls.yaml" ;;
            auth) echo "configs/collector-auth.yaml" ;;
            *) echo "INVALID_PROFILE" ;;
          esac
      COMPOSE_PROFILES:
        sh: |
          case "{{.PROFILE}}" in
            base) echo "--profile base" ;;
            storage) echo "--profile storage" ;;
            storage-tls) echo "--profile storage-tls" ;;
            auth) echo "--profile auth" ;;
            *) echo "" ;;
          esac
      COMPOSE_FILES:
        sh: |
          if [ "{{.USE_GHCR_IMAGE}}" = "true" ]; then
            echo "-f compose.yaml -f compose.ghcr.yaml"
          else
            echo "-f compose.yaml"
          fi
      GINKGO_FLAGS:
        sh: |
          if [ "${CI:-}" = "true" ]; then
            echo "--succinct"
          else
            echo "-vv"
          fi
      TEST_DIR: './tests/integration/{{.PROFILE | replace "-" "_"}}/'
    env:
      COLLECTOR_CONFIG: "{{.COLLECTOR_CONFIG}}"
      GOWORK: "off"
      # Compose env vars (host port overrides + GHCR image selection)
      WEBHOOK_PORT: "{{.WEBHOOK_PORT}}"
      LOKI_PORT: "{{.LOKI_PORT}}"
      RUSTFS_PORT: "{{.RUSTFS_PORT}}"
      DEX_PORT: "{{.DEX_PORT}}"
      OTLP_PORT: "{{.OTLP_PORT}}"
      COLLECTOR_IMAGE: '{{if eq .USE_GHCR_IMAGE "true"}}{{.GHCR_IMAGE}}:{{.GHCR_TAG}}{{else}}{{end}}'
      # Go test env vars (consumed by EnvOrDefault in test suites)
      WEBHOOK_URL: "http://localhost:{{.WEBHOOK_PORT}}"
      LOKI_URL: "http://localhost:{{.LOKI_PORT}}"
      S3_URL: "http://localhost:{{.RUSTFS_PORT}}"
      OTLP_ADDR: "localhost:{{.OTLP_PORT}}"
      DEX_URL: "http://localhost:{{.DEX_PORT}}"
    cmds:
      - echo "=== Running {{.PROFILE}} layer ==="
      - defer:
          {
            task: down,
            vars:
              {
                COMPOSE_PROFILES: "{{.COMPOSE_PROFILES}}",
                COMPOSE_FILES: "{{.COMPOSE_FILES}}",
              },
          }
      # Ensure data directory exists and is writable by the collector (UID 10001).
      # Previously compose.yaml used the podman-only :U flag for UID remapping;
      # creating the directory up-front is portable across Docker and Podman.
      - mkdir -p .test-output/integration/data && chmod 777 .test-output/integration/data
      - "{{.COMPOSE_CMD}} {{.COMPOSE_FILES}} {{.COMPOSE_PROFILES}} up -d"
      - task: wait
        vars: {PROFILE: "{{.PROFILE}}", COMPOSE_FILES: "{{.COMPOSE_FILES}}"}
      - mkdir -p {{.GINKGO_OUTPUT_DIR}}
      - go tool ginkgo run {{.GINKGO_FLAGS}} --output-dir={{.GINKGO_OUTPUT_DIR}} --junit-report=junit-{{.PROFILE}}.xml {{.TEST_DIR}}

  up:
    desc: "Start integration stack without running tests (for IDE debugging)"
    requires:
      vars:
        - name: PROFILE
          enum:
            ref: .VALID_PROFILES
    vars:
      COLLECTOR_CONFIG:
        sh: |
          case "{{.PROFILE}}" in
            base) echo "configs/collector-base.yaml" ;;
            storage) echo "configs/collector-storage.yaml" ;;
            storage-tls) echo "configs/collector-storage-tls.yaml" ;;
            auth) echo "configs/collector-auth.yaml" ;;
            *) echo "INVALID_PROFILE" ;;
          esac
      COMPOSE_PROFILES:
        sh: |
          case "{{.PROFILE}}" in
            base) echo "--profile base" ;;
            storage) echo "--profile storage" ;;
            storage-tls) echo "--profile storage-tls" ;;
            auth) echo "--profile auth" ;;
            *) echo "" ;;
          esac
      COMPOSE_FILES:
        sh: |
          if [ "{{.USE_GHCR_IMAGE}}" = "true" ]; then
            echo "-f compose.yaml -f compose.ghcr.yaml"
          else
            echo "-f compose.yaml"
          fi
      TEST_DIR: './tests/integration/{{.PROFILE | replace "-" "_"}}/'
    env:
      COLLECTOR_CONFIG: "{{.COLLECTOR_CONFIG}}"
      WEBHOOK_PORT: "{{.WEBHOOK_PORT}}"
      LOKI_PORT: "{{.LOKI_PORT}}"
      RUSTFS_PORT: "{{.RUSTFS_PORT}}"
      DEX_PORT: "{{.DEX_PORT}}"
      OTLP_PORT: "{{.OTLP_PORT}}"
      COLLECTOR_IMAGE: '{{if eq .USE_GHCR_IMAGE "true"}}{{.GHCR_IMAGE}}:{{.GHCR_TAG}}{{else}}{{end}}'
      OTLP_ADDR: "localhost:{{.OTLP_PORT}}"
      DEX_URL: "http://localhost:{{.DEX_PORT}}"
    cmds:
      - task: ensure-certs
      - task: build-if-local
        vars: {USE_GHCR_IMAGE: "{{.USE_GHCR_IMAGE}}"}
      - mkdir -p .test-output/integration/data && chmod 777 .test-output/integration/data
      - "{{.COMPOSE_CMD}} {{.COMPOSE_FILES}} {{.COMPOSE_PROFILES}} up -d --build"
      - task: wait
        vars: {PROFILE: "{{.PROFILE}}", COMPOSE_FILES: "{{.COMPOSE_FILES}}"}
      - cmd: 'echo "Stack running. Run tests with: GOWORK=off go tool ginkgo run -vv {{.TEST_DIR}}"'
      - cmd: 'echo "Tear down with: task integration:down"'

  build-if-local:
    internal: true
    status:
      - test "{{.USE_GHCR_IMAGE}}" = "true"
    cmds:
      - echo "Building local image"
      - task: :infra:build

  build-images:
    internal: true
    desc: Pre-build all container images for integration tests
    status:
      - test "{{.USE_GHCR_IMAGE}}" = "true"
    cmds:
      - task: build-if-local
        vars: {USE_GHCR_IMAGE: "{{.USE_GHCR_IMAGE}}"}

  wait:
    internal: true
    cmd: |
      dump_container_info() {
        local cid="$1" tail="${2:-10}"
        # Detect container runtime from compose command
        local runtime="podman"
        if [[ "{{.COMPOSE_CMD}}" == "docker"* ]]; then
          runtime="docker"
        fi
        if [[ -n "$cid" ]]; then
          echo "Container status:"
          $runtime ps -a --filter "name=$cid" --format "table {{.Names}}\t{{.Status}}" 2>/dev/null || true
          echo "Container logs (last $tail lines):"
          $runtime logs --tail "$tail" "$cid" 2>&1 || true
        fi
      }

      wait_for_service() {
        local name="$1" url="$2" curl_flags="${3:-}" cid="${4:-}"
        for i in $(seq 1 30); do
          if curl -sf $curl_flags "$url" >/dev/null 2>&1; then
            echo "$name: ready"
            return 0
          fi
          echo "$name: waiting... ($i/30)"
          if [[ -n "$cid" ]] && (( i % 5 == 0 )); then
            echo "--- $name diagnostics ---"
            dump_container_info "$cid"
            echo "---"
          fi
          sleep 2
        done
        echo "$name: FAILED after 30 retries"
        echo "=== $name final diagnostics ==="
        dump_container_info "$cid" 30
        echo "==="
        return 1
      }

      # Build service→container name map from compose (project-scoped)
      # docker compose v2.20+ emits NDJSON (one object per line with "Name"),
      # older versions emit a JSON array with "Names".  podman-compose uses
      # "Names" as an array.  The python helper handles all three formats.
      declare -A CONTAINERS
      while read -r cname; do
        for svc in collector loki rustfs rustfs-tls dex; do
          if [[ "$cname" == *"_${svc}_"* || "$cname" == *"-${svc}-"* ]]; then
            CONTAINERS["$svc"]="$cname"
          fi
        done
      done < <({{.COMPOSE_CMD}} {{.COMPOSE_FILES}} ps --format json 2>/dev/null | \
               python3 -c "
      import sys, json
      def names(obj):
          n = obj.get('Names', obj.get('Name', ''))
          return n if isinstance(n, list) else [n]
      for line in sys.stdin:
          line = line.strip()
          if not line: continue
          try: obj = json.loads(line)
          except json.JSONDecodeError: continue
          items = obj if isinstance(obj, list) else [obj]
          for c in items:
              for n in names(c):
                  if n: print(n)
      " 2>/dev/null || true)
      echo "Resolved containers:"
      for svc in "${!CONTAINERS[@]}"; do echo "  $svc -> ${CONTAINERS[$svc]}"; done

      echo "Waiting for services to be ready..."
      wait_for_service "Collector webhook" "http://localhost:{{.WEBHOOK_PORT}}/eventreceiver/healthcheck" "" "${CONTAINERS[collector]:-}"
      wait_for_service "Loki" "http://localhost:{{.LOKI_PORT}}/ready" "" "${CONTAINERS[loki]:-}"
      {{if or (eq .PROFILE "storage") (eq .PROFILE "auth")}}
      wait_for_service "RustFS" "http://localhost:{{.RUSTFS_PORT}}/health" "" "${CONTAINERS[rustfs]:-}"
      {{end}}
      {{if eq .PROFILE "storage-tls"}}
      wait_for_service "RustFS TLS" "https://localhost:{{.RUSTFS_PORT}}/health" "-k" "${CONTAINERS[rustfs-tls]:-}"
      {{end}}
      {{if eq .PROFILE "auth"}}
      wait_for_service "Dex OIDC" "http://localhost:{{.DEX_PORT}}/.well-known/openid-configuration" "" "${CONTAINERS[dex]:-}"
      {{end}}
      echo "All services ready."

  down:
    desc: Tear down integration test stack
    vars:
      COMPOSE_FILES: '{{.COMPOSE_FILES | default "-f compose.yaml"}}'
    cmds:
      - cmd: "{{.COMPOSE_CMD}} {{.COMPOSE_FILES}} down -v --remove-orphans"
        ignore_error: true
      - task: prune

  validate-profile:
    internal: true
    desc: Validate PROFILE value against allowed profiles
    requires:
      vars:
        - name: PROFILE
          enum:
            ref: .VALID_PROFILES
    cmd: "true"

  prune:
    internal: true
    desc: Remove dangling images and build cache to reclaim disk (CI only)
    status:
      - test "${CI:-}" != "true"
    cmd: |
      # Detect container runtime from compose command
      runtime="podman"
      if [[ "{{.COMPOSE_CMD}}" == "docker"* ]]; then
        runtime="docker"
      fi
      echo "Pruning dangling images..."
      $runtime image prune -f 2>/dev/null || true
      echo "Pruning build cache..."
      $runtime builder prune -f 2>/dev/null || true
      echo "Disk usage after prune:"
      df -h / 2>/dev/null || true
